<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="xui-flex" style="justify-content: center;">
    <form class="xui-form">
        <div class="xui-form-title">
            <h2>Form</h2>
            <div class="xui-form-close"></div>
        </div>

        <div class="xui-form-input">
            <div class="xui-form-item">
                <label for="test">Text</label>
                <input type="text" id="test" maxlength="10">
            </div>

            <div class="xui-form-item">
                <label for="test">Password</label>
                <input type="password" maxlength="100">
            </div>

            <div class="xui-form-item">
                <label for="test">Radio</label>
                <div style="display: flex;">
                    <div>
                        <input type="radio" name="radio">
                        <span>radio 1</span>
                    </div>
                    <div>
                        <input type="radio" name="radio">
                        <span>radio 2</span>
                    </div>
                </div>
            </div>

            <div class="xui-form-item">
                <label for="test">Checkbox</label>

                <input type="Checkbox">1
                <input type="Checkbox">2
                <input type="Checkbox">3
                <input type="Checkbox">4
            </div>

            <div class="xui-form-item">
                <label for="test">Textarea</label>
                <textarea></textarea>
            </div>
        </div>

        <div class="xui-form-button">
            <input type="submit">
            <input type="reset">
        </div>
    </form>
</body>
</html>
